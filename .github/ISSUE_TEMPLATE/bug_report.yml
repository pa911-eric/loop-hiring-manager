name: Bug report
description: Report incorrect, contradictory, or unusable framework behavior.
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: problem
    attributes:
      label: What happened?
      description: Describe the incorrect or contradictory behavior.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What should happen?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: How can we reproduce it?
      description: Include the relevant prompt, file, operating mode, and steps. Remove secrets and private project data.
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version or commit
      placeholder: Commit SHA or repository version, if known

